<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempoTune AI - Soundtrack Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; }
        .song-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent; }
        .song-card:hover { transform: translateY(-8px); border-color: #38bdf8; box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.3); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4 selection:bg-sky-500/30">

    <div class="max-w-5xl w-full text-center">
        <div class="mb-12">
            <h1 class="text-5xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-400 tracking-tight">
                TempoTune AI
            </h1>
            <p class="text-xl text-slate-400 font-medium max-w-2xl mx-auto">
                Генератор саундтреків для авторів. Опишіть сцену з вашої книги або сценарію — ШІ підбере ідеальну атмосферу.
            </p>
        </div>

        <div class="glass p-8 rounded-3xl border border-slate-700 shadow-2xl mb-16">
            <div class="flex flex-col gap-6">
                <textarea id="queryInput" rows="4" 
                    placeholder="Вставте опис сцени... Наприклад: 'Він стояв під холодним дощем, дивлячись на руїни старого міста. В його серці була лише порожнеча та відлуння минулих битв...'" 
                    class="w-full bg-slate-800/50 text-white px-6 py-4 rounded-xl border border-slate-600 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-transparent transition-all resize-none text-lg"></textarea>
                
                <div class="flex flex-col sm:flex-row items-center justify-between gap-6">
                    <div class="flex items-center gap-4 bg-slate-800/80 px-6 py-3 rounded-xl border border-slate-600">
                        <label for="countInput" class="text-slate-300 font-semibold whitespace-nowrap">Кількість треків:</label>
                        <input type="number" id="countInput" value="5" min="1" max="20" 
                            class="w-16 bg-transparent text-sky-400 font-bold text-xl text-center focus:outline-none">
                    </div>

                    <button onclick="getRecommendations()" id="searchBtn"
                        class="w-full sm:w-auto bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 text-white font-bold py-4 px-10 rounded-xl shadow-lg shadow-sky-500/20 transition-all flex items-center justify-center gap-3 group">
                        <i class="fa-solid fa-wand-magic-sparkles group-hover:rotate-12 transition-transform"></i>
                        Створити саундтрек
                    </button>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden mb-12">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-sky-400/20 border-t-sky-400 rounded-full animate-spin"></div>
                <p class="text-sky-400 font-bold animate-pulse text-lg">Аналізуємо емоційний фон вашої сцени...</p>
            </div>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 text-left">
            </div>
    </div>

    <script>
        async function getRecommendations() {
            const query = document.getElementById('queryInput').value;
            const top_k = parseInt(document.getElementById('countInput').value);
            const loader = document.getElementById('loader');
            const resultsGrid = document.getElementById('resultsGrid');
            const searchBtn = document.getElementById('searchBtn');

            if (!query.trim()) {
                alert("Будь ласка, введіть опис сцени!");
                return;
            }

            resultsGrid.innerHTML = '';
            loader.classList.remove('hidden');
            searchBtn.disabled = true;
            searchBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('http://127.0.0.1:8000/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, top_k: top_k })
                });

                if (!response.ok) throw new Error("Помилка сервера");
                const data = await response.json();
                
                data.tracks.forEach(track => {
                    const card = `
                        <a href="${track.url}" target="_blank" class="song-card glass rounded-2xl overflow-hidden block">
                            <div class="relative group">
                                <img src="${track.image}" alt="Cover" class="w-full aspect-square object-cover">
                                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <i class="fa-brands fa-spotify text-5xl text-[#1DB954]"></i>
                                </div>
                            </div>
                            <div class="p-5">
                                <h3 class="font-bold text-lg truncate text-white mb-1" title="${track.song}">${track.song}</h3>
                                <p class="text-slate-400 text-sm font-medium truncate" title="${track.artist}">${track.artist}</p>
                            </div>
                        </a>
                    `;
                    resultsGrid.insertAdjacentHTML('beforeend', card);
                });

                if (data.tracks.length === 0) {
                    resultsGrid.innerHTML = `<p class="col-span-full text-center text-slate-500 py-12">Не вдалося знайти відповідні треки. Спробуйте змінити опис.</p>`;
                }

            } catch (error) {
                console.error('Помилка:', error);
                resultsGrid.innerHTML = `<div class="col-span-full text-center p-8 bg-red-500/10 border border-red-500/20 rounded-2xl">
                    <p class="text-red-400 font-bold">Помилка з'єднання з AI сервером.</p>
                    <p class="text-red-300/60 text-sm mt-2">Переконайтеся, що app.py запущено.</p>
                </div>`;
            } finally {
                loader.classList.add('hidden');
                searchBtn.disabled = false;
                searchBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
